<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000d0e">

<title>Activacion Telefonia</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#009ca4;
--orange:#F7941D;
--magenta:#EC008C;
--bg:#000d0e;
--text:#ff7b00;
--video:#ffffff;
}

body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
color:white;

min-height:10vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

text-align:center;
padding:25px;
}

/* decoraciones fondo */

body::before{
content:'';
position:fixed;
width:420px;
height:420px;
border-radius:100%;
background:radial-gradient(circle,var(--primary),transparent 65%);
top:-120px;
left:-120px;
opacity:.18;
pointer-events:none;
}

body::after{
content:'';
position:fixed;
width:320px;
height:320px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
bottom:-100px;
right:-100px;
opacity:.12;
pointer-events:none;
}

/* logo */

.logo{
width:140px;
margin-bottom:18px;
filter:drop-shadow(0 0 12px rgba(0,156,164,0.5));
}

/* linea superior */

.top-line{
width:100%;
max-width:420px;
height:3px;
background:radial-gradient(circle,#009ca4,#000000);
border-radius:20px;
margin-bottom:28px;
}

/* textos */

h1{
color:var(--text);
font-weight:700;
font-size:25px;
letter-spacing:1px;
margin-bottom:4px;
}



h2{
color:var(--primary);
font-size:19px;
font-weight:600;
margin-top:35px;
margin-bottom:12px;
}


/* CONTENEDOR VIDEO */

.video-preview{
position:relative;
width:100%;
max-width:420px;
aspect-ratio:16/9;
margin:12px 0;
overflow:hidden;
}

/* IMAGEN Y VIDEO DEL MISMO TAMAÑO */

.video-preview img,
.video-preview video{
width:100%;
height:100%;
object-fit:cover;
border-radius:14px;
}

/* IMAGEN */

.video-preview img{
cursor:pointer;
display:block;
}

/* VIDEO */

video{
display:none;
background:black;
}

/* BOTON PLAY */

.play-button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:70px;
height:70px;
border-radius:50%;
border:none;
background:rgba(0,0,0,0.65);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:10;
}

.play-button svg{
fill:white;
width:32px;
height:32px;
}

/* imagen inferior */

.footer-img{
margin-top:35px;
height:100px;
}

/* lineas inferiores */

.color-strip{
display:flex;
gap:6px;
justify-content:center;
margin-top:28px;
width:100%;
max-width:420px;
}

.color-strip span{
height:5px;
border-radius:999px;
flex:1;
}

.cs1{background:#ff7b00;}
.cs2{background:#009da3;}
.cs3{background:#f70083;}
.cs4{background:#ffd92a;}

a {
  text-decoration: none;
  font-size: 18px;
  color: #ffffff;
  background-color: #009ca4;
  padding: 14px 28px;
  border-radius: 12px;
  display: inline-block;
  font-weight: bold;
  box-shadow: 0 0 20px rgba(0, 156, 164, 0.5);
  transition: all 0.4s ease;
  animation: pulse 2s infinite;
  text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
}

/* Hover */
a:hover {
  background-color: #007f85;
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 0 30px rgba(0, 156, 164, 0.8),
              0 0 15px rgba(255, 255, 255, 0.2);
}

/* Pulso animado */
@keyframes pulse {
  0% {
    box-shadow: 0 0 20px rgba(0, 156, 164, 0.4);
  }
  50% {
    box-shadow: 0 0 35px rgba(0, 156, 164, 0.8);
  }
  100% {
    box-shadow: 0 0 20px rgba(0, 156, 164, 0.4);
  }
}
</style>
</head>

<body>

<img src="izzi.png" class="logo" draggable="false">

<div class="top-line"></div>

<h1>FLUJO DE ACTIVACION TELEFONIA</h1>

<h2>POR FAVOR OBSERVE EL VIDEO Y POSTERIORMENTE INGRESE AL FORMULARIO</h2>

<div class="video-preview">

<video

<div class="color-strip">
<span class="cs1"></span>
<span class="cs2"></span>

</div>

<script>

function playVideo(){

/* BLOQUEAR ARRASTRAR IMAGENES Y VIDEO */

document.addEventListener("dragstart",function(e){
e.preventDefault();
});

</script>

</body>
</html>
